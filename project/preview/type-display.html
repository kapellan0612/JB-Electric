<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,800;0,900;1,700;1,900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Archivo', sans-serif; background: #F4F6FB; padding: 24px 28px; }
  .row { margin-bottom: 18px; border-bottom: 1px solid rgba(14,42,92,0.08); padding-bottom: 18px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .label { font-family: 'Archivo', sans-serif; font-size: 10px; font-weight: 700; color: #6B7A99; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
  .display { font-size: 52px; font-weight: 900; line-height: 1.02; color: #0E2A5C; letter-spacing: -0.025em; }
  .display .y { color: #F7A823; position: relative; display: inline-block; }
  .display .y::after { content:''; position:absolute; left:0; right:0; bottom:-6px; height:5px; border-radius:2px; background:#FFD00E; }
  .tagline { font-size: 24px; font-weight: 700; font-style: italic; color: #FFD00E; background: #0E2A5C; padding: 8px 14px; border-radius: 6px; display: inline-block; }
  .h1 { font-size: 36px; font-weight: 900; line-height: 0.98; color: #0E2A5C; letter-spacing: -0.03em; }
  .h2 { font-size: 26px; font-weight: 800; line-height: 1.15; color: #0E2A5C; letter-spacing: -0.02em; }
</style>
</head><body>
  <div class="row">
    <div class="label">Display · Archivo Black 900 · -0.025em · 52–66px</div>
    <div class="display">Just Electrical<br><span class="y">Work Done Right.</span></div>
  </div>
  <div class="row">
    <div class="label">Tagline · Archivo Bold Italic 700 · Yellow on Navy</div>
    <div class="tagline">"Wired for Excellence!"</div>
  </div>
  <div class="row">
    <div class="label">H1 · Archivo Black 900 · -0.03em</div>
    <div class="h1">Expert Electrical<br>Services</div>
  </div>
  <div class="row">
    <div class="label">H2 · Archivo ExtraBold 800 · -0.02em</div>
    <div class="h2">Lighting Solutions</div>
  </div>
</body></html>
