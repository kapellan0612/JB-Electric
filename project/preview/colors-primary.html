<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #F4F6FB; padding: 20px; }
  .swatches { display: flex; gap: 12px; }
  .swatch { flex: 1; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(14,42,92,0.12); }
  .color-block { height: 90px; }
  .info { background: #fff; padding: 10px 12px; }
  .name { font-size: 11px; font-weight: 600; color: #0E2A5C; text-transform: uppercase; letter-spacing: 0.08em; }
  .hex  { font-size: 13px; color: #6B7A99; margin-top: 2px; }
  .role { font-size: 10px; color: #9BAABB; margin-top: 1px; }
</style>
</head><body>
<div class="swatches">
  <div class="swatch">
    <div class="color-block" style="background:#0E2A5C;"></div>
    <div class="info"><div class="name">Deep Navy</div><div class="hex">#0E2A5C</div><div class="role">Primary</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#1B3D8F;"></div>
    <div class="info"><div class="name">Brand Blue</div><div class="hex">#1B3D8F</div><div class="role">Secondary</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#2E5AAA;"></div>
    <div class="info"><div class="name">Electric Blue</div><div class="hex">#2E5AAA</div><div class="role">Tertiary</div></div>
  </div>
</div>
</body></html>
