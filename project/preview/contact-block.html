<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Manrope', sans-serif; background: #F4F6FB; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }

  /* Light contact block (form intro style) */
  .block-light { background: #fff; box-shadow: 0 2px 8px rgba(14,42,92,0.10); border-radius: 10px; padding: 22px 24px; }
  .eyebrow { font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #1B3D8F; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .eyebrow::before { content:''; display: inline-block; width: 24px; height: 2px; background: #FFD00E; border-radius: 1px; }
  .title { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 28px; color: #0E2A5C; letter-spacing: -0.03em; line-height: 1; margin-bottom: 14px; }
  .phone { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 26px; color: #0E2A5C; letter-spacing: -0.01em; text-decoration: none; display: block; margin-bottom: 4px; }
  .email { font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600; color: rgba(14,42,92,0.6); letter-spacing: 0.04em; text-decoration: none; display: block; margin-bottom: 14px; }
  .trust-light { display: flex; gap: 6px; flex-wrap: wrap; }
  .trust-light span { font-family: 'Manrope', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 4px; background: rgba(14,42,92,0.06); color: #1B3D8F; }

  /* Dark info card (matches Contact.jsx sidebar) */
  .block-dark { background: #0E2A5C; border-radius: 12px; padding: 24px 22px; box-shadow: 0 16px 48px rgba(14,42,92,0.22); }
  .bar { height: 3px; background: linear-gradient(90deg, #FFD00E, #F7A823, #F26A21); border-radius: 2px; margin-bottom: 20px; }
  .infoLabel { font-family: 'Manrope', sans-serif; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.30); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 4px; }
  .phoneBig { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 28px; color: #FFD00E; letter-spacing: -0.01em; text-decoration: none; display: block; margin-bottom: 14px; }
  .infoValue { font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.72); text-decoration: none; display: block; line-height: 1.6; margin-bottom: 14px; }
  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 14px 0; }
  .trust-dark { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .trust-dark span { font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 6px; }
</style>
